apiVersion: apps/v1
kind: Deployment
metadata:
  name: back
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back
  template:
    metadata:
      labels:
        app: back
    spec:
      containers:
        - name: back
          image: api-back:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "postgresql://user:password@postgres:5432/president?schema=public"
---
apiVersion: v1
kind: Service
metadata:
  name: back
spec:
  type: LoadBalancer # Ou NodePort / ClusterIP en fonction du cluster
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: back
