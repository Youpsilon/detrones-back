apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-server
spec:
  replicas: 2 # Attention au WebSockets si Colyseus n'est pas bien config avec RedisPresence
  selector:
    matchLabels:
      app: game-server
  template:
    metadata:
      labels:
        app: game-server
    spec:
      containers:
        - name: game-server
          image: api-game-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 2567
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_URL
              value: "redis://redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: game-server
spec:
  type: LoadBalancer
  ports:
    - port: 2567
      targetPort: 2567
  selector:
    app: game-server
