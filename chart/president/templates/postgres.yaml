apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "president.fullname" . }}-postgres-pvc
  labels:
    app: {{ include "president.name" . }}-postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "president.fullname" . }}-postgres
  labels:
    app: {{ include "president.name" . }}-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "president.name" . }}-postgres
  template:
    metadata:
      labels:
        app: {{ include "president.name" . }}-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: {{ .Values.postgres.existingSecret }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "president.fullname" . }}-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "president.fullname" . }}-postgres
  labels:
    app: {{ include "president.name" . }}-postgres
spec:
  ports:
    - port: 5432
  selector:
    app: {{ include "president.name" . }}-postgres
