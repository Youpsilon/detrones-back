services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: president
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  # Conteneur éphémère d'initialisation (Se lance, pousse le schéma, et s'arrête)
  # Ce service permet de faire "npx prisma db push" depuis l'intérieur du réseau Docker,
  # évitant ainsi d'avoir à exposer les ports de Postgres ou à installer Node localement.
  prisma-setup:
    image: node:20-alpine
    working_dir: /app/back
    volumes:
      - .:/app
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/president?schema=public"
    command: /bin/sh -c "apk add --no-cache openssl && npx prisma@5.22.0 db push"
    depends_on:
      - postgres

  back:
    build:
      context: .
      dockerfile: back/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/president?schema=public"
    depends_on:
      - postgres

  game-server:
    build:
      context: .
      dockerfile: game-server/Dockerfile
    ports:
      - "2567:2567"
    environment:
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:


