services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: president
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  back:
    build:
      context: .
      dockerfile: back/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/president?schema=public"
    depends_on:
      - postgres

  game-server:
    build:
      context: .
      dockerfile: game-server/Dockerfile
    ports:
      - "2567:2567"
    environment:
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:


